<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}DBZ Cyber Arena{% endblock %}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/cyber.css') }}">
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body>

<nav class="nav">

<div class="logo">
DRAGON BALL Z CYBER ARENA
</div>

<div class="nav-links">

<a href="{{ url_for('auth.index') }}">Home</a>
<a href="{{ url_for('challenges.list') }}">Challenges</a>
<a href="{{ url_for('scoreboard.index') }}">Scoreboard</a>

{% if current_user.is_authenticated %}
<a href="{{ url_for('team.dashboard') }}">Team</a>
<a href="{{ url_for('profile.edit') }}">Profile</a>
{% else %}
<a href="{{ url_for('auth.login') }}" class="btn login-btn">Login</a>
<a href="{{ url_for('auth.register') }}" class="btn register-btn">Register</a>
{% endif %}

</div>

</nav>

{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='js/particles.js') }}"></script>

</body>
</html>
