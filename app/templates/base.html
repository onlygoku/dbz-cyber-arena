<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}DBZ Cyber Arena{% endblock %}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/cyber.css') }}">
<script src="https://cdn.tailwindcss.com"></script>

{% block extra_head %}{% endblock %}

</head>

<body class="bg-[#05060a] text-gray-200 overflow-x-hidden">

<nav class="flex justify-between items-center px-6 py-4 border-b border-orange-500 shadow-[0_0_25px_rgba(255,120,0,0.3)]">

<div class="text-orange-400 font-bold text-lg tracking-widest">
DRAGON BALL Z CYBER ARENA
</div>

<div class="flex gap-6 text-sm">

<a href="{{ url_for('index') }}" class="hover:text-orange-400">Home</a>
<a href="{{ url_for('challenges.list') }}" class="hover:text-orange-400">Challenges</a>
<a href="{{ url_for('scoreboard.index') }}" class="hover:text-orange-400">Scoreboard</a>

{% if current_user.is_authenticated %}
<a href="{{ url_for('team.dashboard') }}" class="hover:text-orange-400">Team</a>
<a href="{{ url_for('profile.edit') }}" class="hover:text-orange-400">Profile</a>
{% else %}
<a href="{{ url_for('auth.login') }}" class="hover:text-orange-400">Login</a>
{% endif %}

</div>

</nav>

<main class="px-6">

{% block content %}{% endblock %}

</main>

<script src="{{ url_for('static', filename='js/shenron.js') }}"></script>

</body>
</html>
