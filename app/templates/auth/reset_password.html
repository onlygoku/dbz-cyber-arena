{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🔒</div>
      <h1 class="font-display text-2xl font-bold text-purple-400 uppercase tracking-widest">Reset Password</h1>
      <p class="text-gray-500 text-sm mt-1">Enter your new password below</p>
    </div>
    <div class="ctf-card p-8">
      <form method="POST" class="space-y-5">
        <div>
          <label class="font-display text-xs text-gray-400 uppercase tracking-widest block mb-2">New Password</label>
          <input type="password" name="new_password" required class="ctf-input" placeholder="Min 8 characters" minlength="8"/>
        </div>
        <div>
          <label class="font-display text-xs text-gray-400 uppercase tracking-widest block mb-2">Confirm New Password</label>
          <input type="password" name="confirm_password" required class="ctf-input" placeholder="Repeat new password"/>
        </div>
        <button type="submit" class="btn-primary w-full py-3">Reset Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
