{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🔑</div>
      <h1 class="font-display text-2xl font-bold text-orange-400 uppercase tracking-widest">Forgot Password</h1>
      <p class="text-gray-500 text-sm mt-1">Enter your email to receive a reset link</p>
    </div>
    <div class="ctf-card p-8">
      <form method="POST" class="space-y-5">
        <div>
          <label class="font-display text-xs text-gray-400 uppercase tracking-widest block mb-2">Email Address</label>
          <input type="email" name="email" required class="ctf-input" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <button type="submit" class="btn-primary w-full py-3">Send Reset Link</button>
      </form>
      <div class="mt-6 text-center text-sm text-gray-500">
        Remember your password?
        <a href="{{ url_for('auth.login') }}" class="text-orange-400 hover:underline">Login here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
