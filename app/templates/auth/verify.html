{% extends "base.html" %}
{% block title %}Verify Email{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="text-center max-w-md">
    <div class="text-6xl mb-6">📧</div>
    <h1 class="font-display text-2xl font-bold text-yellow-400 uppercase tracking-widest mb-4">Check Your Email</h1>
    <p class="text-gray-400 mb-6">
      We've sent a verification link to your email address. Click the link to activate your account.
    </p>
    <div class="ctf-card p-4 font-mono text-sm text-cyan-400">
      Can't find it? Check your spam folder.
    </div>
    <div class="mt-6">
      <a href="{{ url_for('auth.login') }}" class="btn-secondary">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
