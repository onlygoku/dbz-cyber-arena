{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">⚡</div>
      <h1 class="font-display text-2xl font-bold text-orange-400 uppercase tracking-widest">Login</h1>
      <p class="text-gray-500 text-sm mt-1">Access the Cyber Arena</p>
    </div>
    <div class="ctf-card p-8">
      <form method="POST" class="space-y-5">
        <div>
          <label class="font-display text-xs text-gray-400 uppercase tracking-widest block mb-2">Username or Email</label>
          <input type="text" name="identifier" required class="ctf-input" placeholder="goku@capsulecorp.net" autocomplete="username"/>
        </div>
        <div>
          <label class="font-display text-xs text-gray-400 uppercase tracking-widest block mb-2">Password</label>
          <input type="password" name="password" required class="ctf-input" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2">
            <input type="checkbox" name="remember" class="accent-orange-500"/>
            <span class="text-sm text-gray-400">Remember me</span>
          </label>
          <a href="{{ url_for('auth.forgot_password') }}" class="text-xs font-mono text-gray-500 hover:text-orange-400">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary w-full py-3 text-center block">Enter Arena</button>
      </form>
      <div class="mt-4 text-center text-sm text-gray-500"><a href="{{ url_for('auth.forgot_password') }}" class="text-gray-500 hover:text-orange-400">Forgot password?</a></div>
      <div class="mt-6 text-center text-sm text-gray-500">
        No account?
        <a href="{{ url_for('auth.register') }}" class="text-orange-400 hover:underline">Register here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
