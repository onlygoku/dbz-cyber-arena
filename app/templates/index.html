{% extends "base.html" %}
{% block title %}Welcome{% endblock %}

{% block content %}

<div class="hero-bg">

<canvas id="particles"></canvas>

<div class="hero-dragon">

<div class="shenron-aura"></div>

<div class="orbit">
  <div class="orbit-inner">

    <div class="dragonball ball1">★</div>
    <div class="dragonball ball2">★★</div>
    <div class="dragonball ball3">★★★</div>
    <div class="dragonball ball4">★★★★</div>
    <div class="dragonball ball5">★★★★★</div>
    <div class="dragonball ball6">★★★★★★</div>
    <div class="dragonball ball7">★★★★★★★</div>

  </div>
</div>

<img src="{{ url_for('static', filename='img/dragon.png') }}" class="dragon">

</div>

<div class="hero-text">

<h1>DRAGON BALL Z</h1>
<h2>CYBER ARENA</h2>

<p>Capture The Flag Competition</p>

<div class="hero-buttons">
<a href="{{ url_for('auth.register') }}" class="btn-primary">Enter Arena</a>
<a href="{{ url_for('auth.login') }}" class="btn-secondary">Login</a>
</div>

</div>

</div>

{% endblock %}
