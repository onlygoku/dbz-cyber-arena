{% extends "base.html" %}
{% block title %}Welcome{% endblock %}

{% block content %}

<div class="hero-bg">

<canvas id="particles"></canvas>

<div class="lightning"></div>

<div class="hero-dragon">

<div class="shenron-aura"></div>

<div class="orbit">
  <div class="orbit-inner">

    <div class="dragonball ball1"><span>★</span></div>
    <div class="dragonball ball2"><span>★★</span></div>
    <div class="dragonball ball3"><span>★★★</span></div>
    <div class="dragonball ball4"><span>★★★★</span></div>
    <div class="dragonball ball5"><span>★★★★★</span></div>
    <div class="dragonball ball6"><span>★★★★★★</span></div>
    <div class="dragonball ball7"><span>★★★★★★★</span></div>

  </div>
</div>

<img src="{{ url_for('static', filename='img/dragon.png') }}"
     class="w-full dragon-glow">

</div>

<div class="text-center mt-16">

<h1 class="text-5xl font-black text-orange-400 mb-4">
DRAGON BALL Z
</h1>

<h2 class="text-3xl text-yellow-400 mb-6">
CYBER ARENA
</h2>

<p class="text-gray-400 mb-10">
Capture The Flag Competition
</p>

<div class="flex gap-4 justify-center">

<a href="{{ url_for('auth.register') }}" class="btn-primary">
Enter Arena
</a>

<a href="{{ url_for('auth.login') }}" class="btn-secondary">
Login
</a>

</div>

</div>

</div>

{% endblock %}
