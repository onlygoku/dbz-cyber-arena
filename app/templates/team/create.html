{% extends "base.html" %}
{% block title %}Create Team{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">⚔️</div>
      <h1 class="font-display text-2xl font-bold text-orange-400 uppercase tracking-widest">Create Team</h1>
      <p class="text-gray-500 text-sm mt-1">Assemble your squad</p>
    </div>
    <div class="ctf-card p-8">
      <form method="POST" class="space-y-5">
        <div>
          <label class="font-display text-xs text-gray-400 uppercase tracking-widest block mb-2">Team Name</label>
          <input type="text" name="name" required minlength="2" maxlength="64"
            class="ctf-input" placeholder="SaiyanHackers"/>
          <p class="text-xs text-gray-600 mt-1 font-mono">Choose wisely — it'll be on the scoreboard.</p>
        </div>
        <button type="submit" class="btn-primary w-full py-3">
          Form Team →
        </button>
      </form>
      <div class="mt-4 text-center text-sm text-gray-500">
        Have a code?
        <a href="{{ url_for('team.join') }}" class="text-orange-400 hover:underline">Join existing team</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
