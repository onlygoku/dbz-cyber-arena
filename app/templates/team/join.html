{% extends "base.html" %}
{% block title %}Join Team{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🤝</div>
      <h1 class="font-display text-2xl font-bold text-orange-400 uppercase tracking-widest">Join Team</h1>
      <p class="text-gray-500 text-sm mt-1">Enter your invite code</p>
    </div>
    <div class="ctf-card p-8">
      <form method="POST" class="space-y-5">
        <div>
          <label class="font-display text-xs text-gray-400 uppercase tracking-widest block mb-2">Invite Code</label>
          <input type="text" name="invite_code" required
            class="ctf-input text-center tracking-widest uppercase" placeholder="a1b2c3d4e5f6g7h8"
            value="{{ request.args.get('code', '') }}"/>
        </div>
        <button type="submit" class="btn-primary w-full py-3">
          Join Team →
        </button>
      </form>
      <div class="mt-4 text-center text-sm text-gray-500">
        Want your own team?
        <a href="{{ url_for('team.create') }}" class="text-orange-400 hover:underline">Create one</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
